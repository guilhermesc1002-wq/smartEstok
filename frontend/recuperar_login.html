<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Recuperar senha</title>
  <link rel="stylesheet" href="style_login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .mensagem-aviso {
      animation: slideIn 0.3s ease-in-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">

    <img src="img/logo.png" class="logo">

    <div class="login-container">

      <h1>Recuperar senha</h1>

      <p>Digite seu email para receber instruções de recuperação de senha</p>

      <form id="form-recuperacao">

        <label for="email_recuperacao">Email</label>

        <div class="input-group">
          <span class="fa-solid fa-envelope"></span>
          <input type="email" id="email_recuperacao" placeholder="Digite o email de recuperação" required>
        </div>

        <button type="submit">Enviar</button>

        <a href="tela_login.html">Voltar para login</a>

      </form>

    </div>

  </div>

  <script>
    // Configuração da API
    const API_CONFIG = {
      BASE_URL: 'http://localhost:8080/api/',
      ENDPOINTS: {
        RECUPERAR_SENHA: '/recuperar-senha'
      },
      HEADERS: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      }
    };

    class APIService {
      async requisicao(endpoint, opcoes = {}) {
        const url = API_CONFIG.BASE_URL + endpoint;
        const config = {
          headers: API_CONFIG.HEADERS,
          ...opcoes
        };

        try {
          const response = await fetch(url, config);
          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            return {
              sucesso: false,
              codigo: response.status,
              mensagem: data.message || data.mensagem || `Erro HTTP ${response.status}`,
              dados: data
            };
          }
          return { sucesso: true, ...data };
        } catch (erro) {
          return { sucesso: false, mensagem: erro.message, codigo: 0 };
        }
      }

      async recuperarSenha(email) {
        return this.requisicao(API_CONFIG.ENDPOINTS.RECUPERAR_SENHA, {
          method: 'POST',
          body: JSON.stringify({ email })
        });
      }
    }

    const apiService = new APIService();

    // Manipulador de Recuperação de Senha
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('form-recuperacao');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('email_recuperacao').value.trim();
          
          if (!email) {
            exibirMensagem('Email é obrigatório', 'erro');
            return;
          }

          if (!validarEmail(email)) {
            exibirMensagem('Email inválido', 'erro');
            return;
          }

          const botao = form.querySelector('button[type="submit"]');
          const textoOriginal = botao.textContent;
          botao.disabled = true;
          botao.textContent = 'Enviando...';

          const resposta = await apiService.recuperarSenha(email);

          if (!resposta.sucesso) {
            exibirMensagem(resposta.mensagem || 'Erro ao solicitar recuperação', 'erro');
            botao.disabled = false;
            botao.textContent = textoOriginal;
            return;
          }

          exibirMensagem('Email de recuperação enviado com sucesso!', 'sucesso');
          document.getElementById('email_recuperacao').value = '';
          sessionStorage.setItem('recovery_email', email);
          
          setTimeout(() => {
            window.location.href = 'verificar_email.html?email=' + encodeURIComponent(email);
          }, 2000);
        });
      }
    });

    function validarEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return regex.test(email);
    }

    function exibirMensagem(mensagem, tipo = 'info') {
      const anterior = document.querySelector('.mensagem-aviso');
      if (anterior) anterior.remove();

      const div = document.createElement('div');
      div.className = `mensagem-aviso mensagem-${tipo}`;
      div.textContent = mensagem;
      div.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 4px;
        font-weight: 500;
        z-index: 1000;
        animation: slideIn 0.3s ease-in-out;
        ${tipo === 'erro' ? 'background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;' : ''}
        ${tipo === 'sucesso' ? 'background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;' : ''}
        ${tipo === 'info' ? 'background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb;' : ''}
      `;
      document.body.appendChild(div);
      setTimeout(() => {
        div.style.animation = 'slideOut 0.3s ease-in-out';
        setTimeout(() => div.remove(), 300);
      }, 5000);
    }
  </script>
</body>
</html>
