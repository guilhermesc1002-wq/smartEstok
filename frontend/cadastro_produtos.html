<!DOCTYPE html>
<html lang="pt-br" data-api-url="http://localhost:8080/api">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="http://localhost:8080/api">
    <title>Cadastro de produtos - SmartEstok</title>
    <link rel="stylesheet" href="style_cadastro.css">
    <script type="module" src="app-cadastro-produtos.js"></script>
  </head>
  
  <body data-api-url="http://localhost:8080/api">
    
    <header>
      <nav>
        <button type="button" aria-label="Menu de navegação">☰</button>
        <form role="search">
          <input type="text" placeholder="Pesquisar produtos..." aria-label="Pesquisar produtos">
          <button type="submit">Buscar</button>
        </form>
        <div>
          <a href="#perfil" aria-label="Acessar perfil do usuário">Perfil</a>
        </div>
      </nav>
    </header>
    
    <main>
      <section>
        <h1>Cadastro de produtos</h1>
        
        <form id="formCadastroProduto" novalidate>
          
          <fieldset>
            <legend>Dados do produto</legend>
            
            <div class="form-group">
              <label for="nome_produto">Nome do produto *</label>
              <input 
                type="text" 
                id="nome_produto" 
                placeholder="Digite o nome do produto" 
                required
                aria-required="true"
                aria-label="Nome do produto">
            </div>
            
            <div class="form-group">
              <label for="descricao">Descrição *</label>
              <textarea 
                id="descricao" 
                placeholder="Descreva o produto" 
                rows="3" 
                required
                aria-required="true"
                aria-label="Descrição do produto"></textarea>
            </div>
            
            <div class="form-group">
              <label for="categoria">Categoria *</label>
              <input 
                type="text" 
                id="categoria" 
                placeholder="Ex: Alimentos, Bebidas" 
                required
                aria-required="true"
                aria-label="Categoria do produto">
            </div>
          </fieldset>
          
          <fieldset>
            <legend>Fornecedor</legend>
            
            <div class="form-group">
              <label for="fornecedorId">Fornecedor *</label>
              <select 
                id="fornecedorId" 
                name="fornecedorId"
                required
                aria-required="true"
                aria-label="Selecione um fornecedor"
                data-loading="true">
                <option value="">Carregando fornecedores...</option>
              </select>
              <small id="fornecedorHelp" class="form-help">Carregando fornecedores...</small>
            </div>
          </fieldset>
          
          <fieldset>
            <legend>Estoque e Preço</legend>
            
            <div class="form-group">
              <label for="quantidade">Quantidade *</label>
              <input 
                type="number" 
                id="quantidade" 
                placeholder="Ex: 10" 
                min="0" 
                required
                aria-required="true"
                aria-label="Quantidade em estoque">
            </div>
            
            <div class="form-group">
              <label for="preco">Preço (R$) *</label>
              <input 
                type="number" 
                id="preco" 
                placeholder="Ex: 25,50" 
                step="0.01" 
                min="0.01" 
                required
                aria-required="true"
                aria-label="Preço do produto">
            </div>
          </fieldset>

          <div class="form-actions">
            <button 
              type="submit" 
              id="btnSalvar"
              aria-label="Salvar novo produto">
              Salvar
            </button>
            <button 
              type="button" 
              id="btnCancelar"
              aria-label="Cancelar cadastro">
              Cancelar
            </button>
          </div>
          
        </form>
        
      </section>
    </main>
  </body>
  
</html>
