<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>SmartStock - Login</title>
  <link rel="stylesheet" href="style_login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .mensagem-aviso {
      animation: slideIn 0.3s ease-in-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper">

    <img src="logo.png" class="logo">

    <div class="login-container">

      <h1>Login</h1>

      <form id="form-login">

        <label for="email">Usuário</label>
        <div class="input-group">
          <span class="fa-solid fa-user"></span>
          <input type="text" id="email" placeholder="Digite o seu login" required>
        </div>

        <label for="senha">Senha</label>
        <div class="input-group">
          <span class="fa-solid fa-lock"></span>
          <input type="password" id="senha" placeholder="Digite a sua senha" required>
        </div>

        <button type="submit">Entrar</button>

        <a href="recuperar_login.html">Esqueci a senha</a>

      </form>

    </div>

  </div>

  <script>
    // Configuração da API
    const API_CONFIG = {
      BASE_URL: 'http://localhost:8080/api',
      ENDPOINTS: {
        LOGIN: '/login',
        RECOVER_PASSWORD: '/recuperar-senha'
      },  
      HEADERS: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      }
    };

    class APIService {
      constructor() {
        this.token = localStorage.getItem('auth_token') || null;
      }

      async requisicao(endpoint, opcoes = {}) {
        const url = API_CONFIG.BASE_URL + endpoint;
        const headers = {
          ...API_CONFIG.HEADERS,
          ...(this.token ? { 'Authorization': `Bearer ${this.token}` } : {})
        };

        const config = {
          headers,
          ...opcoes
        };

        try {
          const response = await fetch(url, config);
          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            return {
              sucesso: false,
              codigo: response.status,
              mensagem: data.message || data.mensagem || `Erro HTTP ${response.status}`,
              dados: data
            };
          }
          return { sucesso: true, ...data };
        } catch (erro) {
          return { sucesso: false, mensagem: erro.message, codigo: 0 };
        }
      }

      async login(email, senha) {
        return this.requisicao(API_CONFIG.ENDPOINTS.LOGIN, {
          method: 'POST',
          body: JSON.stringify({ email, senha })
        });
      }
    }

    const apiService = new APIService();

    // Manipulador de Login
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('form-login');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('email').value.trim();
          const senha = document.getElementById('senha').value;
          
          if (!email || !senha) {
            exibirMensagem('Usuário e senha são obrigatórios', 'erro');
            return;
          }

          const botao = form.querySelector('button[type="submit"]');
          const textoOriginal = botao.textContent;
          botao.disabled = true;
          botao.textContent = 'Entrando...';

          const resposta = await apiService.login(email, senha);

          // Verifica se login foi bem-sucedido
          if (!resposta.sucesso || !resposta.token) {
            exibirMensagem(resposta.mensagem || 'Erro ao fazer login', 'erro');
            botao.disabled = false;
            botao.textContent = textoOriginal;
            return;
          }

          // Login bem-sucedido
          localStorage.setItem('auth_token', resposta.token);
          apiService.token = resposta.token;
          
          exibirMensagem('Login realizado com sucesso!', 'sucesso');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        });
      }
    });

    function exibirMensagem(mensagem, tipo = 'info') {
      const anterior = document.querySelector('.mensagem-aviso');
      if (anterior) anterior.remove();

      const div = document.createElement('div');
      div.className = `mensagem-aviso mensagem-${tipo}`;
      div.textContent = mensagem;
      div.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 4px;
        font-weight: 500;
        z-index: 1000;
        animation: slideIn 0.3s ease-in-out;
        ${tipo === 'erro' ? 'background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;' : ''}
        ${tipo === 'sucesso' ? 'background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;' : ''}
        ${tipo === 'info' ? 'background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb;' : ''}
      `;
      document.body.appendChild(div);
      setTimeout(() => {
        div.style.animation = 'slideOut 0.3s ease-in-out';
        setTimeout(() => div.remove(), 300);
      }, 5000);
    }
  </script>
</body>
</html>
