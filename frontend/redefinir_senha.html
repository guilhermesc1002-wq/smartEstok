<!DOCTYPE html>
<html lang="pt-br">
  
  <head>
    <meta charset="utf-8">
    <title>Redefinir senha</title>
    <link rel="stylesheet" href="style_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      .mensagem-aviso {
        animation: slideIn 0.3s ease-in-out;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }

      .password-strength {
        height: 4px;
        background-color: #e9ecef;
        border-radius: 2px;
        margin-top: 8px;
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        width: 0%;
        transition: width 0.3s ease;
      }

      .password-strength-bar.fraca {
        background-color: #dc3545;
        width: 33%;
      }

      .password-strength-bar.media {
        background-color: #ffc107;
        width: 66%;
      }

      .password-strength-bar.forte {
        background-color: #28a745;
        width: 100%;
      }
    </style>
  </head>
  
  <body>
    
    <div class="login-wrapper">
      <img src="img/logo.png" class="logo">
      <div class="login-container">
        <h1>Redefinir senha</h1>
        <p>Digite sua nova senha para acessar novamente</p>

        <form id="form-redefinir-senha">

          <label for="senha">Nova senha</label>
          <div class="input-group">
            <span class="fa-solid fa-lock"></span>
            <input type="password" id="senha" placeholder="Digite sua nova senha" required>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>

          <label for="confirmar-senha">Confirmar senha</label>
          <div class="input-group">
            <span class="fa-solid fa-lock"></span>
            <input type="password" id="confirmar-senha" placeholder="Digite a senha novamente" required>
          </div>

          <button type="submit">Salvar nova senha</button>

        </form>

        <a href="tela_login.html">Voltar para login</a>

      </div>
    </div>

    <script>
      // Configuracao da API
      const API_CONFIG = {
        BASE_URL: 'http://localhost:8080/api',
        ENDPOINTS: {
          REDEFINIR_SENHA: '/redefinir-senha'
        },
        HEADERS: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        }
      };

      class APIService {
        async requisicao(endpoint, opcoes = {}) {
          const url = API_CONFIG.BASE_URL + endpoint;
          const config = {
            headers: API_CONFIG.HEADERS,
            ...opcoes
          };

          try {
            const response = await fetch(url, config);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
              throw new Error(data.message || `Erro HTTP ${response.status}`);
            }
            return { sucesso: true, ...data };
          } catch (erro) {
            return { sucesso: false, mensagem: erro.message };
          }
        }

        async redefinirSenha(token, novaSenha, confirmacaoSenha) {
          return this.requisicao(API_CONFIG.ENDPOINTS.REDEFINIR_SENHA, {
            method: 'POST',
            body: JSON.stringify({
              token,
              novaSenha,
              confirmacaoSenha
            })
          });
        }
      }

      const apiService = new APIService();

      document.addEventListener('DOMContentLoaded', function() {
        const senhaInput = document.getElementById('senha');
        const strengthBar = document.getElementById('strength-bar');
        const form = document.getElementById('form-redefinir-senha');

        if (senhaInput && strengthBar) {
          senhaInput.addEventListener('input', (e) => {
            const senha = e.target.value;
            let forca = 'fraca';

            if (senha.length >= 8 &&
                /[a-z]/.test(senha) &&
                /[A-Z]/.test(senha) &&
                /[0-9]/.test(senha)) {
              forca = 'forte';
            } else if (senha.length >= 6) {
              forca = 'media';
            }

            strengthBar.className = `password-strength-bar ${forca}`;
          });
        }

        if (form) {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const senha = senhaInput.value;
            const confirmacaoSenha = document.getElementById('confirmar-senha').value;

            if (senha.length < 6) {
              exibirMensagem('A senha deve ter no minimo 6 caracteres', 'erro');
              return;
            }

            if (senha !== confirmacaoSenha) {
              exibirMensagem('As senhas nao correspondem', 'erro');
              return;
            }

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
              exibirMensagem('Token de redefinicao invalido. Solicite uma nova recuperacao de senha.', 'erro');
              return;
            }

            const botao = e.target.querySelector('button[type="submit"]');
            botao.disabled = true;
            const textoOriginal = botao.textContent;
            botao.textContent = 'Salvando...';

            const resposta = await apiService.redefinirSenha(token, senha, confirmacaoSenha);

            if (resposta.sucesso === false) {
              exibirMensagem(resposta.mensagem || 'Erro ao redefinir senha', 'erro');
              botao.disabled = false;
              botao.textContent = textoOriginal;
              return;
            }

            exibirMensagem('Senha redefinida com sucesso!', 'sucesso');
            setTimeout(() => {
              window.location.href = 'tela_login.html';
            }, 2000);
          });
        }
      });

      function exibirMensagem(mensagem, tipo = 'info') {
        const anterior = document.querySelector('.mensagem-aviso');
        if (anterior) anterior.remove();

        const div = document.createElement('div');
        div.className = `mensagem-aviso mensagem-${tipo}`;
        div.textContent = mensagem;
        div.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          padding: 15px 20px;
          border-radius: 4px;
          font-weight: 500;
          z-index: 1000;
          animation: slideIn 0.3s ease-in-out;
          ${tipo === 'erro' ? 'background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;' : ''}
          ${tipo === 'sucesso' ? 'background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;' : ''}
          ${tipo === 'info' ? 'background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb;' : ''}
        `;
        document.body.appendChild(div);
        setTimeout(() => {
          div.style.animation = 'slideOut 0.3s ease-in-out';
          setTimeout(() => div.remove(), 300);
        }, 5000);
      }
    </script>

  </body>

</html>
