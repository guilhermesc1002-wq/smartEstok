spring.application.name=project friday

# ============================================================
# Azure SQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:sqlserver://smartstock.database.windows.net:1433;database=smartstock;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30
spring.datasource.username=CloudSAba42d136@smartstock
spring.datasource.password=D@uglas5
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.crud.project=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# Server Configuration
# ============================================================
server.port=8080
server.servlet.context-path=/api


