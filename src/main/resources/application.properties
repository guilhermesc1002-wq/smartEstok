spring.application.name=project friday

# ============================================================
# MongoDB Atlas Configuration
# ============================================================
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.database=smartstock

# MongoDB Atlas URI com retry e timeouts aumentados
# Username: smartstock
# Password: smart@stock (encoded as smart%40stock)
# Cluster: smartstock.erkrji7.mongodb.net
spring.data.mongodb.uri=mongodb+srv://smartstock:smart%40stock@smartstock.erkrji7.mongodb.net/smartstock?retryWrites=true&w=majority&serverSelectionTimeoutMS=30000&connectTimeoutMS=30000&socketTimeoutMS=30000&maxPoolSize=50

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=WARN
logging.level.com.crud.project=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=WARN

# ============================================================
# Server Configuration
# ============================================================
server.port=8080
